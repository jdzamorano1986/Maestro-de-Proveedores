<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro de Proveedores — Delegaciones Presidenciales (en vivo)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
<style>
  :root { color-scheme: light;
    --bg:#f5f6f8; --card:#ffffff; --ink:#1a2233; --muted:#68738a;
    --line:#e3e6ec; --accent:#0d5fd6; --accent-soft:#e8f0fd;
    --ok:#127a45; --ok-bg:#e3f5ec; --no:#b0332a; --no-bg:#fdeae8;
    --warn-bg:#fff4e0; --warn:#9a6200;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:14px/1.45 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:1240px; margin:0 auto; padding:20px 24px 48px; }
  header { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; justify-content:space-between; }
  header h1 { font-size:20px; margin:0 0 2px; }
  header p { margin:0; color:var(--muted); font-size:13px; }
  #refresh { padding:7px 14px; border:1px solid var(--line); background:var(--card); border-radius:8px;
    cursor:pointer; font-size:13px; color:var(--accent); font-weight:600; }
  #refresh:hover { background:var(--accent-soft); }

  #status { margin-top:18px; padding:14px 16px; background:var(--card); border:1px solid var(--line);
    border-radius:10px; color:var(--muted); }
  #status.error { background:var(--no-bg); color:var(--no); border-color:#f0c6c2; }
  #status.error code { background:#fff; padding:1px 5px; border-radius:4px; font-size:12px; }

  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:18px; }
  .kpi { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .kpi .v { font-size:24px; font-weight:700; }
  .kpi .l { font-size:12px; color:var(--muted); margin-top:2px; }

  .filters { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; align-items:center;
    background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .filters input[type=search], .filters select { padding:7px 10px; border:1px solid var(--line);
    border-radius:8px; background:#fff; font-size:13px; color:var(--ink); }
  .filters input[type=search] { flex:1 1 200px; min-width:160px; }
  .filters label.chk { display:flex; gap:6px; align-items:center; font-size:13px; color:var(--muted); cursor:pointer; }
  .filters button { padding:7px 12px; border:1px solid var(--line); background:#fff; border-radius:8px;
    cursor:pointer; font-size:13px; color:var(--muted); }
  .filters button:hover { background:var(--accent-soft); color:var(--accent); }

  .charts { display:grid; grid-template-columns:3fr 2fr; gap:12px; margin-top:14px; }
  @media (max-width:900px){ .charts { grid-template-columns:1fr; } }
  .chartcard { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .chartcard h3 { margin:0 0 10px; font-size:13px; color:var(--muted); font-weight:600; }
  .chartbox { position:relative; height:260px; }

  .tablecard { margin-top:14px; background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .tablecard .thead { padding:12px 14px; font-size:13px; color:var(--muted); border-bottom:1px solid var(--line); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { text-align:left; padding:9px 12px; background:#fafbfc; border-bottom:1px solid var(--line);
    color:var(--muted); font-weight:600; white-space:nowrap; cursor:pointer; user-select:none; }
  thead th .arr { font-size:10px; }
  tbody td { padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
  tbody tr.row { cursor:pointer; }
  tbody tr.row:hover { background:var(--accent-soft); }
  tr.detail td { background:#fafbfc; padding:12px 16px; }
  .detail .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:10px; }
  .detail .f .k { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); }
  .detail .f .d { margin-top:2px; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:600; }
  .pill.si { background:var(--ok-bg); color:var(--ok); }
  .pill.no { background:var(--no-bg); color:var(--no); }
  .pill.nd { background:#eef0f4; color:var(--muted); }
  .pill.sinprov { background:var(--warn-bg); color:var(--warn); }
  .prov { font-weight:600; }
  .sub { color:var(--muted); font-size:12px; }
  .empty { padding:28px; text-align:center; color:var(--muted); }
  a { color:var(--accent); text-decoration:none; }
  @media print { .filters, #refresh { display:none; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Maestro de Proveedores de Emergencia</h1>
      <p>Proveedores ingresados por las Delegaciones Presidenciales · <span id="updated">conectando con Google Sheets…</span></p>
    </div>
    <button id="refresh">↻ Actualizar</button>
  </header>

  <div id="status">Cargando datos desde Google Sheets…</div>
  <div id="app" style="display:none">
    <div class="kpis" id="kpis"></div>

    <div class="filters">
      <input type="search" id="q" placeholder="Buscar proveedor, RUT, rubro, contacto…">
      <select id="fRegion"><option value="">Todas las regiones</option></select>
      <select id="fDeleg"><option value="">Todas las delegaciones</option></select>
      <select id="fCat"><option value="">Todos los rubros</option></select>
      <select id="f247">
        <option value="">Disponibilidad 24/7: todas</option>
        <option value="SI">Solo con 24/7</option>
        <option value="NO">Sin 24/7</option>
      </select>
      <label class="chk"><input type="checkbox" id="fSin"> Incluir registros “sin proveedor”</label>
      <button id="clear">Limpiar</button>
    </div>

    <div class="charts">
      <div class="chartcard"><h3>Proveedores por región</h3><div class="chartbox"><canvas id="chRegion"></canvas></div></div>
      <div class="chartcard"><h3>Principales rubros</h3><div class="chartbox"><canvas id="chCat"></canvas></div></div>
    </div>

    <div class="tablecard">
      <div class="thead" id="count"></div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr id="hdr"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1vA7fncDM1SqvkJefbojZycwn9-ZVVrgNw7umUsxH3wI";
const GID = "2038566956";

let rows = [], view = [], sortKey = "region", sortDir = 1, openIdx = -1;
let chRegion = null, chCat = null, filtersReady = false;

const $ = id => document.getElementById(id);
const esc = s => (s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function titleCase(s){
  return s.toLowerCase().replace(/(^|\s)\p{L}/gu, m => m.toUpperCase());
}
function normCat(s){
  const t = (s||"").replace(/\s+/g,' ').trim();
  if (!t || /^sin proveedor/i.test(t)) return "";
  return titleCase(t);
}
function siNo(s){
  const t = (s||"").trim().toUpperCase();
  if (t.startsWith("SI") || t.startsWith("SÍ")) return "SI";
  if (t.startsWith("NO")) return "NO";
  return "";
}

// Parser CSV compatible RFC 4180 (comillas, comas y saltos de línea dentro de celdas)
function parseCSV(text){
  const out = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){
        if (text[i+1] === '"'){ cur += '"'; i++; }
        else inQ = false;
      } else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ','){ row.push(cur); cur = ""; }
      else if (c === '\n'){ row.push(cur); out.push(row); row = []; cur = ""; }
      else if (c !== '\r') cur += c;
    }
  }
  if (cur !== "" || row.length){ row.push(cur); out.push(row); }
  return out;
}

// Ubica columnas por palabra clave en el encabezado (tolerante a cambios de orden)
function mapColumns(hdr){
  const h = hdr.map(x => (x||"").toLowerCase());
  const find = (kws, fb) => {
    const i = h.findIndex(c => kws.every(k => c.includes(k)));
    return i >= 0 ? i : fb;
  };
  return {
    fecha: find(["marca temporal"], 0),
    quien: find(["nombre"], 1),
    cargo: find(["cargo"], 2),
    region: find(["región"], 3),
    deleg: find(["delegación"], 4),
    proveedor: find(["razón social"], 5),
    rut: find(["rut"], 6),
    cat: find(["categoría"], 7),
    giro: find(["giro"], 8),
    chilecompras: find(["chilecompras"], 9),
    mercadopublico: find(["mercado público"], 10),
    activosFlag: find(["activos registrados a su nombre"], 11),
    activos: find(["indique los activos"], 12),
    precio: find(["precio"], 13),
    disp247: find(["disponibilidad 24/7"], 14),
    contacto: find(["persona de contacto"], 15),
    fono: find(["telefono"], 16),
    email: find(["correo"], 17),
    descr: find(["descripción"], 18),
  };
}

function buildRows(table){
  if (!table.length) return [];
  const col = mapColumns(table[0]);
  const g = (r,k) => (r[col[k]] || "").trim();
  const out = [];
  for (const r of table.slice(1)){
    if (r.every(c => !(c||"").trim())) continue;
    const razon = g(r,"proveedor");
    const sinProv = /sin proveedor/i.test(razon) || !razon;
    out.push({
      fecha: g(r,"fecha"), quien: titleCase(g(r,"quien")), cargo: g(r,"cargo"),
      region: g(r,"region") || "—", deleg: g(r,"deleg") || "—",
      proveedor: sinProv ? "" : titleCase(razon.replace(/\s+/g,' ')),
      rut: g(r,"rut"), cat: normCat(g(r,"cat")), giro: g(r,"giro"),
      chilecompras: siNo(g(r,"chilecompras")), mercadopublico: siNo(g(r,"mercadopublico")),
      activosFlag: siNo(g(r,"activosFlag")), activos: g(r,"activos"),
      precio: g(r,"precio"), disp247: siNo(g(r,"disp247")),
      contacto: titleCase(g(r,"contacto")), fono: g(r,"fono"), email: g(r,"email").toLowerCase(),
      descr: g(r,"descr"), sinProv
    });
  }
  return out;
}

async function fetchCSV(){
  const bust = "&t=" + Date.now();
  const urls = [
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}${bust}`,
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}${bust}`,
  ];
  let lastErr = null;
  for (const u of urls){
    try {
      const resp = await fetch(u, { redirect: "follow" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const text = await resp.text();
      if (!text || text.trimStart().startsWith("<")) throw new Error("respuesta no válida (¿hoja sin acceso público?)");
      return text;
    } catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("sin respuesta");
}

async function load(){
  const st = $("status");
  st.className = ""; st.style.display = "";
  st.textContent = "Cargando datos desde Google Sheets…";
  try {
    const csv = await fetchCSV();
    rows = buildRows(parseCSV(csv));
    if (!rows.length) throw new Error("la hoja no contiene registros");
    st.style.display = "none";
    $("app").style.display = "";
    $("updated").textContent = "datos en vivo · actualizado " + new Date().toLocaleString("es-CL");
    if (!filtersReady){ initFilters(); filtersReady = true; }
    else { refreshSelects(); }
    apply();
  } catch(e){
    st.className = "error";
    st.innerHTML = "No se pudieron cargar los datos (" + esc(e.message) + ").<br><br>" +
      "Verifica que la hoja de Google esté compartida como <b>“Cualquier persona con el enlace — Lector”</b> " +
      "(en la hoja: botón <code>Compartir</code> → Acceso general). Luego pulsa <b>↻ Actualizar</b>.<br>" +
      "Si abriste este archivo directamente desde el computador y no carga, súbelo a un hosting (GitHub Pages, Netlify) o inténtalo en otro navegador.";
    $("updated").textContent = "sin conexión con la hoja";
  }
}

function fillSelect(sel, values, keep){
  const cur = keep ? sel.value : "";
  sel.length = 1;
  values.forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
  if (cur && values.includes(cur)) sel.value = cur;
}
function refreshSelects(){
  fillSelect($("fRegion"), [...new Set(rows.map(r=>r.region))].sort((a,b)=>a.localeCompare(b,'es')), true);
  fillSelect($("fCat"), [...new Set(rows.map(r=>r.cat).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')), true);
  updateDeleg();
}
function initFilters(){
  refreshSelects();
  $("q").addEventListener("input", apply);
  $("fRegion").addEventListener("change", () => { updateDeleg(); apply(); });
  ["fDeleg","fCat","f247","fSin"].forEach(id => $(id).addEventListener("change", apply));
  $("clear").addEventListener("click", () => {
    $("q").value=""; $("fRegion").value=""; updateDeleg(); $("fDeleg").value="";
    $("fCat").value=""; $("f247").value=""; $("fSin").checked=false; apply();
  });
}
function updateDeleg(){
  const reg = $("fRegion").value;
  const pool = reg ? rows.filter(r=>r.region===reg) : rows;
  fillSelect($("fDeleg"), [...new Set(pool.map(r=>r.deleg))].sort((a,b)=>a.localeCompare(b,'es')), true);
}

function apply(){
  const q = $("q").value.trim().toLowerCase();
  const reg = $("fRegion").value, del = $("fDeleg").value, cat = $("fCat").value, d247 = $("f247").value;
  const incSin = $("fSin").checked;
  view = rows.filter(r => {
    if (r.sinProv && !incSin) return false;
    if (reg && r.region !== reg) return false;
    if (del && r.deleg !== del) return false;
    if (cat && r.cat !== cat) return false;
    if (d247 && r.disp247 !== d247) return false;
    if (q){
      const hay = [r.proveedor,r.rut,r.cat,r.giro,r.contacto,r.email,r.fono,r.descr,r.deleg,r.region,r.quien].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  openIdx = -1;
  renderKpis(); renderCharts(); renderTable();
}

function renderKpis(){
  const provs = view.filter(r=>!r.sinProv);
  const uniq = new Set(provs.map(r => r.rut.replace(/[.\s]/g,'').toLowerCase() || r.proveedor)).size;
  const regs = new Set(view.map(r=>r.region)).size;
  const dels = new Set(view.map(r=>r.deleg)).size;
  const p247 = provs.length ? Math.round(100*provs.filter(r=>r.disp247==="SI").length/provs.length) : 0;
  const pMP = provs.length ? Math.round(100*provs.filter(r=>r.mercadopublico==="SI").length/provs.length) : 0;
  $("kpis").innerHTML = [
    [provs.length, "Proveedores registrados"],
    [uniq, "Proveedores únicos (RUT)"],
    [regs, "Regiones"],
    [dels, "Delegaciones"],
    [p247+"%", "Con disponibilidad 24/7"],
    [pMP+"%", "Habilitados en Mercado Público"],
  ].map(([v,l]) => `<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");
}

function counts(arr, key){
  const m = new Map();
  arr.forEach(r => { const k = r[key]; if (k) m.set(k,(m.get(k)||0)+1); });
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}
const PALETTE = ["#0d5fd6","#2e9e6b","#d97b29","#8351c9","#c93c62","#188fa3","#a3872a","#5b6b84"];

function renderCharts(){
  if (typeof Chart === "undefined") { document.querySelector(".charts").style.display = "none"; return; }
  const provs = view.filter(r=>!r.sinProv);
  const byReg = counts(provs,"region");
  const byCat = counts(provs,"cat").slice(0,8);
  const mk = (old, ctx, cfg) => { if (old) old.destroy(); return new Chart(ctx, cfg); };
  chRegion = mk(chRegion, $("chRegion"), {
    type:"bar",
    data:{ labels:byReg.map(x=>x[0].replace(/^Región (de |del |)/,"")),
      datasets:[{ data:byReg.map(x=>x[1]), backgroundColor:"#0d5fd6", borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, indexAxis:"y",
      plugins:{ legend:{display:false} },
      scales:{ x:{ ticks:{precision:0}, grid:{color:"#eef0f4"} }, y:{ grid:{display:false}, ticks:{font:{size:11}} } } }
  });
  chCat = mk(chCat, $("chCat"), {
    type:"doughnut",
    data:{ labels:byCat.map(x=>x[0]), datasets:[{ data:byCat.map(x=>x[1]), backgroundColor:PALETTE }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:"55%",
      plugins:{ legend:{ position:"right", labels:{ boxWidth:10, font:{size:11} } } } }
  });
}

const COLS = [
  ["proveedor","Proveedor"], ["cat","Rubro"], ["region","Región"], ["deleg","Delegación"],
  ["chilecompras","ChileCompras"], ["mercadopublico","M. Público"], ["disp247","24/7"], ["contacto","Contacto"]
];
function pill(v){
  if (v==="SI") return '<span class="pill si">SÍ</span>';
  if (v==="NO") return '<span class="pill no">NO</span>';
  return '<span class="pill nd">—</span>';
}
function renderTable(){
  $("hdr").innerHTML = COLS.map(([k,l]) =>
    `<th data-k="${k}">${l} <span class="arr">${sortKey===k ? (sortDir>0?"▲":"▼") : ""}</span></th>`).join("");
  $("hdr").querySelectorAll("th").forEach(th => th.addEventListener("click", () => {
    const k = th.dataset.k;
    if (sortKey===k) sortDir = -sortDir; else { sortKey = k; sortDir = 1; }
    renderTable();
  }));

  const sorted = [...view].sort((a,b) => sortDir * String(a[sortKey]).localeCompare(String(b[sortKey]),'es'));
  $("count").textContent = `${sorted.length} registro${sorted.length===1?"":"s"} — haz clic en una fila para ver el detalle`;

  if (!sorted.length){ $("tbody").innerHTML = `<tr><td colspan="8" class="empty">Sin resultados para los filtros aplicados.</td></tr>`; return; }

  $("tbody").innerHTML = sorted.map((r,i) => `
    <tr class="row" data-i="${i}">
      <td><span class="prov">${r.sinProv ? '<span class="pill sinprov">Sin proveedor informado</span>' : esc(r.proveedor)}</span><div class="sub">${esc(r.rut)}</div></td>
      <td>${esc(r.cat) || '<span class="sub">—</span>'}</td>
      <td>${esc(r.region)}</td>
      <td>${esc(r.deleg)}</td>
      <td>${pill(r.chilecompras)}</td>
      <td>${pill(r.mercadopublico)}</td>
      <td>${pill(r.disp247)}</td>
      <td>${esc(r.contacto)}<div class="sub">${esc(r.fono)}</div></td>
    </tr>`).join("");

  $("tbody").querySelectorAll("tr.row").forEach(tr => tr.addEventListener("click", () => {
    const i = +tr.dataset.i;
    document.querySelectorAll("tr.detail").forEach(d => d.remove());
    if (openIdx === i){ openIdx = -1; return; }
    openIdx = i;
    const r = sorted[i];
    const f = (k,v) => v ? `<div class="f"><div class="k">${k}</div><div class="d">${esc(v)}</div></div>` : "";
    const det = document.createElement("tr");
    det.className = "detail";
    det.innerHTML = `<td colspan="8"><div class="grid">
      ${f("Giro SII", r.giro)}
      ${f("Precio de referencia", r.precio)}
      ${f("Activos registrados", r.activosFlag==="SI" ? (r.activos||"Sí") : (r.activosFlag==="NO"?"No":""))}
      ${f("Capacidades / equipamiento", r.descr)}
      ${r.email ? `<div class="f"><div class="k">Email</div><div class="d"><a href="mailto:${esc(r.email)}">${esc(r.email)}</a></div></div>` : ""}
      ${f("Ingresado por", r.quien + (r.cargo ? " · " + titleCase(r.cargo) : ""))}
      ${f("Fecha de ingreso", r.fecha)}
    </div></td>`;
    tr.after(det);
  }));
}

$("refresh").addEventListener("click", load);
load();
</script>
</body>
</html>
